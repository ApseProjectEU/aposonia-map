<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aposonía Map - Nea Paralia</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="coordinate-display">
        <span id="coord-text">Click on map to get coordinates</span>
        <button id="export-btn" title="Export temporary markers">Export</button>
    </div>
    <div id="map"></div>
    <div id="sidebar" class="sidebar hidden">
        <button id="close-sidebar" class="close-btn">&times;</button>
        <div id="sidebar-content">
            <h2 id="point-name"></h2>
            <div id="point-description"></div>
            <div id="point-stress">
                <span class="stress-label">Stress Level:</span>
                <span id="stress-value"></span>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/ui.js"></script>
    <script src="js/map.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
